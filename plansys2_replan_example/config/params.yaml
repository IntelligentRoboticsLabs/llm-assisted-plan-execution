move:
  ros__parameters:
    plugins:
      - plansys2_move_bt_node
    waypoints: ["wp1", "wp2", "wp3", "wp4", "wp5", "wp6", "wp7", "wp8"]
    waypoint_coords:
      wp1: [0.0, 0.0, 0.0]
      wp2: [1.0, 0.0, 0.0]
      wp3: [0.0, 1.0, 0.0]
      wp4: [1.0, 1.0, 0.0]
      wp5: [2.0, 0.0, 0.0]
      wp6: [3.0, 0.0, 0.0]
      wp7: [2.0, 1.0, 0.0]
      wp8: [3.0, 1.0, 0.0]
pick:
  ros__parameters:
    plugins:
      - plansys2_open_gripper_bt_node
      - plansys2_close_gripper_bt_node
      - plansys2_approach_object_bt_node
place:
  ros__parameters:
    plugins:
      - plansys2_open_gripper_bt_node
      - plansys2_close_gripper_bt_node

